name: Stiai Ca Auto-Poster

on:
  workflow_dispatch:
  repository_dispatch:
    types: [cron-post]

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download fonts
        run: python setup_project.py

      - name: Random delay (8-42 min)
        run: python -c "import random,time; d=random.randint(480,2520); print(f'Random delay: {d}s ({d//60}m {d%60}s)'); time.sleep(d)"

      - name: Create .env from secrets
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cat > .env << EOF
          FACEBOOK_PAGE_ID=${FACEBOOK_PAGE_ID}
          FACEBOOK_PAGE_ACCESS_TOKEN=${FACEBOOK_PAGE_ACCESS_TOKEN}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_MODEL=gpt-4o-mini
          LOW_CONTENT_THRESHOLD=4
          GENERATE_BATCH_SIZE=8
          MAX_POSTS_PER_DAY=7
          TIMEZONE=Europe/Bucharest
          MAX_RANDOM_DELAY_SECONDS=0
          EOF

      - name: Post to Facebook
        run: python main.py --no-delay

      - name: Save state back to GitHub
        run: |
          git config user.name "StiaiCa Bot"
          git config user.email "bot@stiai-ca.local"
          git add content/curiosities.json posted/posted_log.json assets/images/ || true
          git diff --staged --quiet || git commit -m "Auto-post $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
