name: Stiai Ca Auto-Poster

on:
  workflow_dispatch:
  repository_dispatch:
    types: [cron-post]

permissions:
  contents: write

concurrency:
  group: stiai-ca-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download fonts
        run: python setup_project.py

      - name: Random delay (8-42 min)
        run: python -c "import random,time; d=random.randint(480,2520); print('Delay', d, 'seconds'); time.sleep(d)"

      - name: Create env file
        run: |
          echo "FACEBOOK_PAGE_ID=${{ secrets.FACEBOOK_PAGE_ID }}" >> .env
          echo "FACEBOOK_PAGE_ACCESS_TOKEN=${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "OPENAI_MODEL=gpt-4o-mini" >> .env
          echo "LOW_CONTENT_THRESHOLD=4" >> .env
          echo "GENERATE_BATCH_SIZE=8" >> .env
          echo "MAX_POSTS_PER_DAY=7" >> .env
          echo "TIMEZONE=Europe/Bucharest" >> .env
          echo "MAX_RANDOM_DELAY_SECONDS=0" >> .env
          echo "FORCE_REGENERATE_IMAGE=true" >> .env

      - name: Sync latest state
        run: git pull --rebase origin master

      - name: Post to Facebook
        run: python main.py --no-delay

      - name: Save state
        run: |
          git config user.name "StiaiCa Bot"
          git config user.email "bot@stiai-ca.local"
          git add content/curiosities.json posted/posted_log.json
          if git diff --staged --quiet; then
            echo "No state changes to save."
            exit 0
          fi
          git commit -m "Auto-post $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for attempt in 1 2 3 4 5; do
            git fetch origin master
            git rebase origin/master || git rebase --abort
            if git push origin master; then
              echo "State saved successfully."
              exit 0
            fi
            echo "Push attempt ${attempt} failed, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Failed to push state after 5 attempts."
          exit 1
